apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-nix-store
  namespace: nfs-system
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: zroot
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ganesha-config
  namespace: nfs-system
data:
  ganesha.conf: |
    NFS_Core_Param
    {
        NFS_Protocols = 4;
    }
    EXPORT
    {
        Export_Id = 101;
        Path = /MASS/Plex;
        Pseudo = /plex;
        Access_Type = RW;
        Squash = No_Root_Squash;
        SecType = sys;
        Filesystem_id = 101.101;
        FSAL {
            Name = VFS;
        }
    }
    _DBUS
    {
        Service_DBus = false;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: nfs-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: ripnix
      initContainers:
      - name: init-nix
        image: nixpkgs/nix:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            if [ ! -d /mnt/nix/store ]; then
              echo "Populating Nix store..."
              cp -a /nix/* /mnt/nix/
            fi
        volumeMounts:
        - name: nix-store
          mountPath: /mnt/nix
      containers:
      - name: nfs-server
        image: nixpkgs/nix:latest
        securityContext:
          privileged: true
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -ex
            # Ensure ganesha is installed
            if ! command -v ganesha.nfsd >/dev/null; then
              nix-channel --add https://nixos.org/channels/nixpkgs-unstable nixpkgs
              nix-channel --update
              nix-env -iA nixpkgs.nfs-ganesha nixpkgs.bash
            fi
            
            mkdir -p /var/run/ganesha /var/lib/nfs/ganesha
            ln -sf /proc/mounts /etc/mtab
            
            echo "Starting Ganesha (v4 only)..."
            exec ganesha.nfsd -F -L /dev/stdout -f /etc/ganesha/ganesha.conf
        volumeMounts:
        - name: plex-data
          mountPath: /MASS/Plex
        - name: nix-store
          mountPath: /nix
        - name: config
          mountPath: /etc/ganesha/ganesha.conf
          subPath: ganesha.conf
      volumes:
      - name: plex-data
        hostPath:
          path: /MASS/Plex
          type: Directory
      - name: nix-store
        persistentVolumeClaim:
          claimName: nfs-nix-store
      - name: config
        configMap:
          name: ganesha-config
