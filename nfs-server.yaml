apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: nfs-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: ripnix
      containers:
      - name: nfs-server
        image: erichough/nfs-server
        securityContext:
          privileged: true
        env:
        - name: NFS_VERSION
          value: "4"
        - name: NFS_EXPORT_0
          value: /exports *(rw,fsid=0,async,no_subtree_check,no_auth_nlm,insecure,no_root_squash)
        - name: NFS_EXPORT_1
          value: /exports/plex *(rw,async,no_subtree_check,no_auth_nlm,insecure,no_root_squash)
        volumeMounts:
        - name: plex-data
          mountPath: /exports/plex
          mountPropagation: Bidirectional
        - name: nfs-modules
          mountPath: /lib/modules
          readOnly: true
      volumes:
      - name: plex-data
        hostPath:
          path: /MASS/Plex
          type: Directory
      - name: nfs-modules
        hostPath:
          path: /lib/modules
