apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ganesha-state
  namespace: nfs-system
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: zroot
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ganesha-config
  namespace: nfs-system
data:
  ganesha.conf: |
    LOG
    {
        Default_Log_Level = EVENT;
    }
    NFS_Core_Param
    {
        NFS_Protocols = 4;
        NFS_Port = 20499;
        Bind_Addr = 100.67.54.105;
    }
    EXPORT
    {
        Export_Id = 101;
        Path = /MASS/Plex;
        Pseudo = /;
        Access_Type = RW;
        Squash = No_Root_Squash;
        SecType = sys;
        Filesystem_id = 101.101;
        FSAL {
            Name = VFS;
        }
    }
    _DBUS
    {
        Service_DBus = false;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: nfs-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: ripnix
      containers:
      - name: nfs-server
        image: ubuntu:22.04
        securityContext:
          privileged: true
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            export DEBIAN_FRONTEND=noninteractive
            
            # Link PVC directories for caching
            mkdir -p /ganesha-state/apt-cache /ganesha-state/apt-lists /ganesha-state/nfs-state
            mkdir -p /var/cache/apt/archives /var/lib/apt/lists /var/lib/nfs/ganesha
            
            mount --bind /ganesha-state/apt-cache /var/cache/apt/archives
            mount --bind /ganesha-state/apt-lists /var/lib/apt/lists
            mount --bind /ganesha-state/nfs-state /var/lib/nfs/ganesha
            
            if ! command -v ganesha.nfsd >/dev/null; then
              echo "Installing NFS Ganesha (cached)..."
              apt-get update
              apt-get install -y -o Dpkg::Options::="--force-confold" nfs-ganesha nfs-ganesha-vfs bash rpcbind dbus
            fi
            
            mkdir -p /var/run/ganesha /run/dbus
            rpcbind || true
            dbus-daemon --system --fork || true
            
            cp /config/ganesha.conf /etc/ganesha/ganesha.conf
            ln -sf /proc/mounts /etc/mtab
            
            echo "Starting Ganesha on 100.67.54.105:20499..."
            exec ganesha.nfsd -F -L /dev/stdout -f /etc/ganesha/ganesha.conf
        volumeMounts:
        - name: plex-data
          mountPath: /MASS/Plex
        - name: ganesha-state
          mountPath: /ganesha-state
        - name: config-source
          mountPath: /config
      volumes:
      - name: plex-data
        hostPath:
          path: /MASS/Plex
          type: Directory
      - name: ganesha-state
        persistentVolumeClaim:
          claimName: ganesha-state
      - name: config-source
        configMap:
          name: ganesha-config
