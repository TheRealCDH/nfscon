apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: nfs-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: ripnix
      containers:
      - name: nfs-server
        image: nixpkgs/nix:latest
        securityContext:
          privileged: true
        command: ["/bin/sh", "-c"]
        args:
          - |
            nix-env -iA nixpkgs.nfs-ganesha nixpkgs.bash
            mkdir -p /var/run/ganesha
            echo "Starting Ganesha (Nix)..."
            ganesha.nfsd -F -L /dev/stdout -f /etc/ganesha/ganesha.conf
        volumeMounts:
        - name: plex-data
          mountPath: /MASS/Plex
        - name: config
          mountPath: /etc/ganesha/ganesha.conf
          subPath: ganesha.conf
      volumes:
      - name: plex-data
        hostPath:
          path: /MASS/Plex
          type: Directory
      - name: config
        configMap:
          name: ganesha-config
