apiVersion: v1
kind: ConfigMap
metadata:
  name: ganesha-config
  namespace: nfs-system
data:
  ganesha.conf: |
    LOG
    {
        Default_Log_Level = EVENT;
    }
    NFS_Core_Param
    {
        NFS_Protocols = 4;
        NFS_Port = 20499;
        Bind_Addr = 100.67.54.105;
    }
    EXPORT
    {
        Export_Id = 101;
        Path = /MASS/Plex;
        Pseudo = /;
        Access_Type = RW;
        Squash = No_Root_Squash;
        SecType = sys;
        Filesystem_id = 101.101;
        FSAL {
            Name = VFS;
        }
    }
    _DBUS
    {
        Service_DBus = false;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: nfs-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: ripnix
      containers:
      - name: nfs-server
        image: ubuntu:22.04
        securityContext:
          privileged: true
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            export DEBIAN_FRONTEND=noninteractive
            
            echo "Installing NFS Ganesha..."
            apt-get update -qq
            apt-get install -y -qq -o Dpkg::Options::="--force-confold" nfs-ganesha nfs-ganesha-vfs bash rpcbind > /dev/null
            
            mkdir -p /var/run/ganesha /var/lib/nfs/ganesha
            rpcbind || true
            
            ln -sf /proc/mounts /etc/mtab
            cp /config/ganesha.conf /etc/ganesha/ganesha.conf
            
            echo "Starting Ganesha on 100.67.54.105:20499..."
            exec ganesha.nfsd -F -L /dev/stdout -f /etc/ganesha/ganesha.conf
        volumeMounts:
        - name: plex-data
          mountPath: /MASS/Plex
        - name: config-source
          mountPath: /config
      volumes:
      - name: plex-data
        hostPath:
          path: /MASS/Plex
          type: Directory
      - name: config-source
        configMap:
          name: ganesha-config
