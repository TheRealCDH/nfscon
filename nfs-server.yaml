apiVersion: v1
kind: ConfigMap
metadata:
  name: ganesha-config
  namespace: nfs-system
data:
  ganesha.conf: |
    EXPORT
    {
        Export_Id = 101;
        Path = /MASS/Plex;
        Pseudo = /plex;
        Access_Type = RW;
        Squash = No_Root_Squash;
        SecType = sys;
        Filesystem_id = 101.101;
        FSAL {
            Name = VFS;
        }
    }
    NFS_Core_Param
    {
        MNT_Port = 32767;
    }
    NFS_KRB5
    {
        Active_krb5 = false;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: nfs-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: ripnix
      containers:
      - name: nfs-server
        image: ghcr.io/mohamnag/nfs-ganesha:latest
        securityContext:
          privileged: true
        volumeMounts:
        - name: plex-data
          mountPath: /MASS/Plex
        - name: config
          mountPath: /etc/ganesha/ganesha.conf
          subPath: ganesha.conf
      volumes:
      - name: plex-data
        hostPath:
          path: /MASS/Plex
          type: Directory
      - name: config
        configMap:
          name: ganesha-config
