apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: nfs-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: ripnix
      containers:
      - name: nfs-server
        image: ubuntu:22.04
        securityContext:
          privileged: true
        command: ["/bin/sh", "-c"]
        args:
          - |
            apt-get update && apt-get install -y dbus
            mkdir -p /var/run/ganesha /run/dbus /var/lib/nfs/ganesha
            dbus-daemon --system --fork
            ln -sf /proc/mounts /etc/mtab
            echo "Starting Ganesha from Host Nix Store..."
            exec /nix/store/ra1q8z3061mcag610ljwyy1r0z097rhz-nfs-ganesha-9.4/bin/ganesha.nfsd -F -L /dev/stdout -f /etc/ganesha/ganesha.conf
        volumeMounts:
        - name: plex-data
          mountPath: /MASS/Plex
        - name: nix-store
          mountPath: /nix
          readOnly: true
        - name: config
          mountPath: /etc/ganesha/ganesha.conf
          subPath: ganesha.conf
      volumes:
      - name: plex-data
        hostPath:
          path: /MASS/Plex
          type: Directory
      - name: nix-store
        hostPath:
          path: /nix
          type: Directory
      - name: config
        configMap:
          name: ganesha-config
