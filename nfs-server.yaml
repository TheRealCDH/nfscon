apiVersion: v1
kind: Namespace
metadata:
  name: nfs-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: nfs-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      # Using hostNetwork to bind to the host's Tailscale IP as requested.
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: ripnix
      containers:
      - name: nfs-server
        image: erichough/nfs-server
        securityContext:
          privileged: true
        env:
        - name: NFS_VERSION
          value: "4"
        # Exporting /MASS/Plex with fsid=101 to ensure a unique file handle.
        - name: NFS_EXPORT_0
          value: /MASS/Plex *(rw,fsid=101,async,no_subtree_check,no_auth_nlm,insecure,no_root_squash)
        volumeMounts:
        - name: plex-data
          mountPath: /MASS/Plex
        - name: nfs-modules
          mountPath: /lib/modules
          readOnly: true
      volumes:
      - name: plex-data
        hostPath:
          path: /MASS/Plex
          type: Directory
      - name: nfs-modules
        hostPath:
          path: /lib/modules
