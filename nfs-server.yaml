apiVersion: v1
kind: ConfigMap
metadata:
  name: ganesha-config
  namespace: nfs-system
data:
  ganesha.conf: |
    NFS_Core_Param
    {
        NFS_Protocols = 4;
    }
    EXPORT
    {
        Export_Id = 101;
        Path = /MASS/Plex;
        Pseudo = /plex;
        Access_Type = RW;
        Squash = No_Root_Squash;
        SecType = sys;
        Filesystem_id = 101.101;
        FSAL {
            Name = VFS;
        }
    }
    NFS_KRB5
    {
        Active_krb5 = false;
    }
    _DBUS
    {
        Service_DBus = false;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: nfs-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: ripnix
      containers:
      - name: nfs-server
        image: ubuntu:22.04
        securityContext:
          privileged: true
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -ex
            export DEBIAN_FRONTEND=noninteractive
            apt-get update && apt-get install -y nfs-ganesha nfs-ganesha-vfs bash dbus rpcbind
            
            mkdir -p /var/run/ganesha /run/dbus /var/lib/nfs/ganesha
            dbus-daemon --system --fork
            rpcbind
            
            ln -sf /proc/mounts /etc/mtab
            
            echo "Starting Ganesha..."
            exec ganesha.nfsd -F -L /dev/stdout -f /etc/ganesha/ganesha.conf
        volumeMounts:
        - name: plex-data
          mountPath: /MASS/Plex
        - name: config
          mountPath: /etc/ganesha/ganesha.conf
          subPath: ganesha.conf
      volumes:
      - name: plex-data
        hostPath:
          path: /MASS/Plex
          type: Directory
      - name: config
        configMap:
          name: ganesha-config
